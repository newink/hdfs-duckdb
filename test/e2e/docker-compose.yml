services:
  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    platform: linux/amd64
    container_name: duckdb-hdfs-namenode
    environment:
      CLUSTER_NAME: duckdb-hdfs
      # Keep Hadoop's internal default filesystem on the native HDFS scheme.
      # The DuckDB extension's user-facing URI scheme is hdfs://.
      CORE_CONF_fs_defaultFS: hdfs://namenode:9000
      HDFS_CONF_dfs_permissions_enabled: "false"
    ports:
      - "9870:9870"
      - "9000:9000"
    volumes:
      - namenode-data:/hadoop/dfs/name
      - ../..:/workspace:ro

  datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    platform: linux/amd64
    container_name: duckdb-hdfs-datanode
    depends_on:
      - namenode
    environment:
      CLUSTER_NAME: duckdb-hdfs
      # Keep Hadoop's internal default filesystem on the native HDFS scheme.
      # The DuckDB extension's user-facing URI scheme is hdfs://.
      CORE_CONF_fs_defaultFS: hdfs://namenode:9000
      HDFS_CONF_dfs_permissions_enabled: "false"
      SERVICE_PRECONDITION: namenode:9870
    ports:
      - "9864:9864"
    volumes:
      - datanode-data:/hadoop/dfs/data
      - ../..:/workspace:ro

volumes:
  namenode-data:
  datanode-data:
